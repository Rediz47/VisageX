[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  external_node_modules = [
    "lightningcss",
    "esbuild",
    "sharp",
    "firebase-admin",
    "pino",
    "pino-http",
    "thread-stream",
    "sonic-boom"
  ]
  node_bundler = "esbuild"

[functions."api"]
  timeout = 26

[functions."api".processing]
  # Vertex AI calls can take 20-25s for complex analyses.
  # Keep the function timeout at 26s (Netlify max for sync functions on most plans).
  # The backend AbortController timeout is set to 25s to finish before the 26s cutoff.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
