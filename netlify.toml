[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["firebase-service-account.json"]
  external_node_modules = [
    "lightningcss",
    "esbuild",
    "sharp",
    "firebase-admin",
    "pino",
    "pino-http",
    "thread-stream",
    "sonic-boom"
  ]
  node_bundler = "esbuild"

[functions."api"]
  timeout = 26

[functions."api".processing]
  # Vertex AI (Gemini 2.5 Flash) can take 20-40s for vision + structured-JSON prompts.
  # Netlify sync function hard cap is 26s. Backend AbortController is set to 24s,
  # which gives Gemini the maximum possible time while leaving 2s to flush the response.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
